<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1.5" stdDeviation="1.5" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#455a64"/>
    </marker>
    <marker id="arrowWifi" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff9800"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="340" rx="12" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <text x="410" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#212529">System Architecture</text>

  <!-- Source label -->
  <rect x="20" y="105" width="100" height="80" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" filter="url(#sh)"/>
  <text x="70" y="138" text-anchor="middle" font-size="11" font-weight="700" fill="#1b5e20">Source</text>
  <text x="70" y="158" text-anchor="middle" font-size="10" fill="#2e7d32">PCM1808 &#x2192;</text>
  <text x="70" y="175" text-anchor="middle" font-size="10" fill="#2e7d32">ESP-NOW TX</text>

  <!-- Wireless -->
  <rect x="160" y="105" width="100" height="80" rx="40" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" filter="url(#sh)"/>
  <text x="210" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="#e65100">ESP-NOW</text>
  <text x="210" y="160" text-anchor="middle" font-size="9" fill="#f57c00">Ch 11 Broadcast</text>
  <text x="210" y="175" text-anchor="middle" font-size="9" fill="#f57c00">115 B / 2 ms</text>

  <!-- ESP32 Sink -->
  <rect x="300" y="60" width="220" height="220" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="1.5" filter="url(#sh)"/>
  <text x="410" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#b71c1c">ESP32 Sink</text>
  <line x1="315" y1="96" x2="505" y2="96" stroke="#ef9a9a" stroke-width="0.5"/>

  <!-- Pipeline blocks inside sink -->
  <rect x="315" y="105" width="190" height="24" rx="4" fill="#ffcdd2"/>
  <text x="410" y="122" text-anchor="middle" font-size="10" fill="#b71c1c">ESP-NOW RX &#x2192; Ring Buffer (12)</text>

  <rect x="315" y="137" width="190" height="24" rx="4" fill="#ffcdd2"/>
  <text x="410" y="154" text-anchor="middle" font-size="10" fill="#b71c1c">ADPCM Decode (stateless)</text>

  <rect x="315" y="169" width="190" height="24" rx="4" fill="#ffcdd2"/>
  <text x="410" y="186" text-anchor="middle" font-size="10" fill="#b71c1c">PLC + Crossfade (24 samp)</text>

  <rect x="315" y="201" width="190" height="24" rx="4" fill="#ffcdd2"/>
  <text x="410" y="218" text-anchor="middle" font-size="10" fill="#b71c1c">Gain 2.0x + Soft Limiter</text>

  <rect x="315" y="233" width="190" height="24" rx="4" fill="#ffcdd2"/>
  <text x="410" y="250" text-anchor="middle" font-size="10" fill="#b71c1c">I2S TX (APLL) &#x2192; Core 1</text>

  <!-- Clock Sync block -->
  <rect x="315" y="263" width="100" height="20" rx="4" fill="#ef9a9a"/>
  <text x="365" y="277" text-anchor="middle" font-size="9" fill="#880e4f">Clock Sync (EMA)</text>

  <rect x="420" y="263" width="85" height="20" rx="4" fill="#ef9a9a"/>
  <text x="462" y="277" text-anchor="middle" font-size="9" fill="#880e4f">Adaptive Buf</text>

  <!-- PCM5102A -->
  <rect x="560" y="105" width="120" height="80" rx="8" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="620" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="#4a148c">PCM5102A</text>
  <text x="620" y="155" text-anchor="middle" font-size="10" fill="#7b1fa2">24-bit DAC</text>
  <text x="620" y="171" text-anchor="middle" font-size="10" fill="#7b1fa2">I2S Input</text>

  <!-- Audio Out -->
  <rect x="720" y="105" width="80" height="80" rx="8" fill="#ede7f6" stroke="#4527a0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="760" y="138" text-anchor="middle" font-size="11" font-weight="700" fill="#311b92">Audio</text>
  <text x="760" y="156" text-anchor="middle" font-size="10" fill="#512da8">Line Out</text>
  <text x="760" y="172" text-anchor="middle" font-size="10" fill="#512da8">L / R</text>

  <!-- Arrows -->
  <line x1="120" y1="145" x2="155" y2="145" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowWifi)"/>

  <line x1="260" y1="145" x2="295" y2="145" stroke="#ff9800" stroke-width="2" marker-end="url(#arrowWifi)"/>

  <line x1="520" y1="145" x2="555" y2="145" stroke="#455a64" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="537" y="138" text-anchor="middle" font-size="8" fill="#78909c">I2S</text>

  <line x1="680" y1="145" x2="715" y2="145" stroke="#455a64" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="697" y="138" text-anchor="middle" font-size="8" fill="#78909c">Analog</text>

  <!-- Footer -->
  <text x="410" y="310" text-anchor="middle" font-size="11" fill="#757575">Target latency: ~12 ms  |  Adaptive jitter compensation  |  PLC on packet loss</text>
  <text x="410" y="328" text-anchor="middle" font-size="10" fill="#9e9e9e">Blocking I2S write acts as timing master -- no separate clock thread needed</text>
</svg>
